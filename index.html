<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Footy Tips 🏉</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #f5c518;
    --gold-dark: #d4a80f;
    --white: #f9f7f2;
    --dark: #111;
    --mid: #2a2a2a;
    --card: #1e1e1e;
    --border: rgba(245,197,24,0.2);
    --mum: #e84393;
    --dad: #3b82f6;
    --jack: #10b981;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--dark); color: var(--white); font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background: repeating-linear-gradient(0deg,transparent,transparent 60px,rgba(255,255,255,0.015) 60px,rgba(255,255,255,0.015) 61px); pointer-events: none; z-index: 0; }
  .app { position: relative; z-index: 1; max-width: 640px; margin: 0 auto; padding: 16px 12px 60px; }

  header { text-align: center; padding: 24px 0 20px; border-bottom: 2px solid var(--gold); margin-bottom: 24px; }
  .header-emoji { font-size: 2.4rem; display: block; margin-bottom: 4px; }
  header h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.2rem, 8vw, 3.2rem); letter-spacing: 2px; color: var(--gold); line-height: 1; }
  header p { font-size: 0.8rem; color: rgba(249,247,242,0.5); margin-top: 6px; letter-spacing: 0.5px; text-transform: uppercase; }

  /* Who are you */
  .who-bar { display: flex; gap: 8px; margin-bottom: 20px; }
  .who-btn { flex: 1; padding: 10px 6px; border: 2px solid rgba(255,255,255,0.1); border-radius: 10px; background: transparent; color: rgba(249,247,242,0.5); font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
  .who-btn.mum.active { border-color: var(--mum); background: rgba(232,67,147,0.12); color: var(--mum); }
  .who-btn.dad.active { border-color: var(--dad); background: rgba(59,130,246,0.12); color: var(--dad); }
  .who-btn.jack.active { border-color: var(--jack); background: rgba(16,185,129,0.12); color: var(--jack); }
  .who-btn.scorer.active { border-color: var(--gold); background: rgba(245,197,24,0.12); color: var(--gold); }
  .who-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: rgba(249,247,242,0.4); margin-bottom: 8px; text-align: center; }

  /* PIN modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.hidden { display: none; }
  .modal { background: var(--card); border: 2px solid var(--gold); border-radius: 16px; padding: 28px 24px; width: 100%; max-width: 320px; text-align: center; }
  .modal h3 { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: var(--gold); letter-spacing: 1px; margin-bottom: 6px; }
  .modal p { font-size: 0.82rem; color: rgba(249,247,242,0.5); margin-bottom: 20px; }
  .pin-input { width: 100%; background: rgba(255,255,255,0.07); border: 1.5px solid var(--border); border-radius: 10px; color: var(--white); font-family: 'Inter', sans-serif; font-size: 1.4rem; font-weight: 700; padding: 12px; text-align: center; letter-spacing: 8px; outline: none; margin-bottom: 12px; }
  .pin-input:focus { border-color: var(--gold); }
  .pin-btn { width: 100%; padding: 12px; background: var(--gold); border: none; border-radius: 10px; color: var(--dark); font-family: 'Inter', sans-serif; font-size: 0.95rem; font-weight: 700; cursor: pointer; margin-bottom: 8px; }
  .pin-cancel { background: none; border: none; color: rgba(249,247,242,0.4); font-family: 'Inter', sans-serif; font-size: 0.82rem; cursor: pointer; }
  .pin-error { color: #ef4444; font-size: 0.8rem; margin-bottom: 8px; min-height: 18px; }

  .tabs { display: flex; gap: 4px; background: var(--mid); border-radius: 12px; padding: 4px; margin-bottom: 20px; }
  .tab { flex: 1; padding: 10px 6px; border: none; border-radius: 9px; background: transparent; color: rgba(249,247,242,0.5); font-family: 'Inter', sans-serif; font-size: 0.78rem; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
  .tab.active { background: var(--gold); color: var(--dark); }

  .section { display: none; }
  .section.active { display: block; }

  .round-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .round-bar label { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; color: rgba(249,247,242,0.6); letter-spacing: 1px; white-space: nowrap; }
  .round-select { background: var(--mid); border: 1.5px solid var(--border); color: var(--white); font-family: 'Inter', sans-serif; font-size: 0.95rem; font-weight: 600; padding: 8px 12px; border-radius: 8px; flex: 1; cursor: pointer; outline: none; }
  .round-select:focus { border-color: var(--gold); }
  .round-meta { font-size: 0.73rem; color: rgba(249,247,242,0.4); margin-bottom: 14px; text-align: center; font-style: italic; }

  /* Loading */
  .loading { text-align: center; padding: 40px 20px; color: rgba(249,247,242,0.4); font-size: 0.9rem; }
  .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid rgba(245,197,24,0.2); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .games-list { display: flex; flex-direction: column; gap: 10px; }
  .game-card { background: var(--card); border: 1.5px solid var(--border); border-radius: 12px; padding: 14px 14px 12px; position: relative; transition: border-color 0.2s; }
  .game-number { font-size: 0.68rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: rgba(249,247,242,0.35); margin-bottom: 8px; }

  .teams-row { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; margin-bottom: 12px; }
  .team-name { font-size: 0.86rem; font-weight: 700; text-align: center; padding: 7px 6px; background: rgba(255,255,255,0.06); border-radius: 7px; line-height: 1.2; }
  .vs { color: rgba(249,247,242,0.3); font-size: 0.75rem; font-weight: 700; letter-spacing: 1px; }

  /* Single tipper tip row */
  .my-tip-row { margin-bottom: 10px; }
  .my-tip-row label { display: block; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 6px; }
  .tip-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .tip-btn { padding: 9px 6px; border: 1.5px solid rgba(255,255,255,0.12); border-radius: 8px; background: transparent; color: rgba(249,247,242,0.6); font-family: 'Inter', sans-serif; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s; text-align: center; }
  .tip-btn.selected.mum { border-color: var(--mum); background: rgba(232,67,147,0.12); color: var(--mum); }
  .tip-btn.selected.dad { border-color: var(--dad); background: rgba(59,130,246,0.12); color: var(--dad); }
  .tip-btn.selected.jack { border-color: var(--jack); background: rgba(16,185,129,0.12); color: var(--jack); }

  /* All tips summary (visible to all) */
  .all-tips { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
  .tipper-chip { font-size: 0.72rem; font-weight: 700; padding: 3px 9px; border-radius: 20px; }
  .tipper-chip.mum { background: rgba(232,67,147,0.12); color: var(--mum); }
  .tipper-chip.dad { background: rgba(59,130,246,0.12); color: var(--dad); }
  .tipper-chip.jack { background: rgba(16,185,129,0.12); color: var(--jack); }
  .tipper-chip.no-tip { background: rgba(255,255,255,0.05); color: rgba(249,247,242,0.3); }

  /* Scorer winner row */
  .winner-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
  .winner-row label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: rgba(249,247,242,0.4); white-space: nowrap; }
  .winner-select { background: rgba(255,255,255,0.05); border: 1.5px solid rgba(255,255,255,0.1); color: var(--white); font-family: 'Inter', sans-serif; font-size: 0.82rem; font-weight: 600; padding: 7px 10px; border-radius: 7px; cursor: pointer; outline: none; flex: 1; -webkit-appearance: none; appearance: none; }
  .winner-select.has-winner { border-color: var(--gold); background: rgba(245,197,24,0.08); }

  /* Result ticks */
  .result-ticks { display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap; }
  .tick { font-size: 0.72rem; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
  .tick.correct { background: rgba(16,185,129,0.2); color: #10b981; }
  .tick.wrong { background: rgba(239,68,68,0.15); color: #ef4444; }

  .saving-indicator { text-align: center; font-size: 0.78rem; color: var(--jack); margin-top: 6px; min-height: 18px; font-weight: 600; }

  .bye-notice { background: rgba(255,255,255,0.04); border: 1px dashed rgba(255,255,255,0.12); border-radius: 10px; padding: 10px 14px; margin-top: 8px; }
  .bye-notice p { font-size: 0.78rem; color: rgba(249,247,242,0.4); font-style: italic; }

  /* Ladder */
  .ladder-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .ladder-header h2 { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 1px; color: var(--gold); }
  .ladder-table { width: 100%; border-collapse: separate; border-spacing: 0 6px; }
  .ladder-table th { font-size: 0.68rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: rgba(249,247,242,0.4); padding: 4px 10px; text-align: left; }
  .ladder-table th:nth-child(n+2) { text-align: center; }
  .ladder-row td { background: var(--card); padding: 14px 10px; font-weight: 600; }
  .ladder-row td:first-child { border-radius: 10px 0 0 10px; padding-left: 14px; }
  .ladder-row td:last-child { border-radius: 0 10px 10px 0; padding-right: 14px; text-align: center; }
  .ladder-row td:nth-child(n+2) { text-align: center; }
  .rank-badge { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; border-radius: 50%; font-size: 0.8rem; font-weight: 800; margin-right: 8px; }
  .rank-1 { background: var(--gold); color: var(--dark); }
  .rank-2 { background: rgba(249,247,242,0.15); color: var(--white); }
  .rank-3 { background: rgba(249,247,242,0.08); color: rgba(249,247,242,0.6); }
  .player-name { font-size: 0.95rem; font-weight: 700; }
  .player-name.mum { color: var(--mum); }
  .player-name.dad { color: var(--dad); }
  .player-name.jack { color: var(--jack); }
  .pts-total { font-size: 1.1rem; font-weight: 800; color: var(--gold); }
  .pts-cell { font-size: 0.85rem; color: rgba(249,247,242,0.6); }

  .round-breakdown { margin-top: 24px; }
  .round-breakdown h3 { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 1px; color: rgba(249,247,242,0.7); margin-bottom: 12px; }
  .breakdown-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; }
  .breakdown-round { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
  .breakdown-round span:first-child { font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: rgba(249,247,242,0.5); }
  .scorer-chips { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip { font-size: 0.78rem; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
  .chip.mum { background: rgba(232,67,147,0.15); color: var(--mum); }
  .chip.dad { background: rgba(59,130,246,0.15); color: var(--dad); }
  .chip.jack { background: rgba(16,185,129,0.15); color: var(--jack); }

  .empty-state { text-align: center; padding: 40px 20px; color: rgba(249,247,242,0.3); }
  .empty-state .big-emoji { font-size: 3rem; display: block; margin-bottom: 12px; }

  @media (max-width: 380px) {
    .tip-btn { font-size: 0.72rem; padding: 7px 4px; }
    .team-name { font-size: 0.78px; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <span class="header-emoji">🏉</span>
    <h1>Family Footy Tips</h1>
    <p>2026 AFL Season</p>
  </header>

  <!-- Who are you? -->
  <div class="who-label">Who are you?</div>
  <div class="who-bar">
    <button class="who-btn mum" onclick="setPlayer('mum')">Mum</button>
    <button class="who-btn dad" onclick="setPlayer('dad')">Dad</button>
    <button class="who-btn jack" onclick="setPlayer('jack')">Jack</button>
    <button class="who-btn scorer" onclick="promptScorer()">📋 Scores</button>
  </div>

  <!-- PIN modal -->
  <div class="modal-overlay hidden" id="pinModal">
    <div class="modal">
      <h3>🔐 Enter PIN</h3>
      <p>Only the scorer can enter results</p>
      <input class="pin-input" type="password" inputmode="numeric" maxlength="4" id="pinInput" placeholder="••••">
      <div class="pin-error" id="pinError"></div>
      <button class="pin-btn" onclick="checkPin()">Unlock</button>
      <button class="pin-cancel" onclick="closePin()">Cancel</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-tips" onclick="showTab('tips', event)">Tips</button>
    <button class="tab" id="tab-ladder" onclick="showTab('ladder', event)">Ladder 🏆</button>
  </div>

  <div id="section-tips" class="section active">
    <div class="round-bar">
      <label>Round</label>
      <select class="round-select" id="roundSelect" onchange="loadRound()"></select>
    </div>
    <div class="round-meta" id="roundMeta"></div>
    <div id="savingIndicator" class="saving-indicator"></div>
    <div class="games-list" id="gamesList"></div>
  </div>

  <div id="section-ladder" class="section">
    <div class="ladder-header"><h2>Ladder</h2></div>
    <div id="ladderContent"></div>
  </div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://cmjjfwdvzueinyqqybwc.supabase.co';
const SUPABASE_KEY = 'sb_publishable_ZtNx-RHCzi9PZCbx0v6GWQ_bV7Sd854';
const SCORER_PIN  = '1234'; // change this to whatever you want

const PLAYERS = ['mum','dad','jack'];
const LABELS  = { mum:'Mum', dad:'Dad', jack:'Jack' };

// ── Fixture ───────────────────────────────────────────────────────────────
const FIXTURE = {
  "Round 11": { dates:"21–24 May", games:[["Hawthorn","Adelaide Crows"],["Richmond","Essendon"],["Fremantle","St Kilda"],["North Melbourne","Gold Coast Suns"],["Geelong Cats","Sydney Swans"],["Collingwood","West Coast Eagles"],["Port Adelaide","Carlton"],["GWS Giants","Brisbane Lions"],["Western Bulldogs","Melbourne"]], byes:[] },

  "Round 13": { dates:"4–8 June", games:[["Adelaide Crows","Geelong Cats"],["Hawthorn","Western Bulldogs"],["North Melbourne","Fremantle"],["Gold Coast Suns","Brisbane Lions"],["West Coast Eagles","Port Adelaide"],["Sydney Swans","St Kilda"],["Essendon","Carlton"],["Collingwood","Melbourne"]], byes:["GWS Giants","Richmond"] },
  "Round 14": { dates:"11–14 June", games:[["Western Bulldogs","Adelaide Crows"],["Geelong Cats","Gold Coast Suns"],["Melbourne","Essendon"],["North Melbourne","West Coast Eagles"],["Port Adelaide","Sydney Swans"],["Richmond","Brisbane Lions"],["St Kilda","GWS Giants"]], byes:["Carlton","Collingwood","Fremantle","Hawthorn"] },
  "Round 15": { dates:"18–21 June", games:[["Fremantle","Geelong Cats"],["Gold Coast Suns","Hawthorn"],["Adelaide Crows","Melbourne"],["GWS Giants","Carlton"],["Collingwood","Port Adelaide"],["Richmond","North Melbourne"],["St Kilda","Western Bulldogs"]], byes:["Brisbane Lions","Essendon","Sydney Swans","West Coast Eagles"] },
  "Round 16": { dates:"25–28 June", games:[["Brisbane Lions","Sydney Swans"],["Carlton","West Coast Eagles"],["Collingwood","Richmond"],["Fremantle","Gold Coast Suns"],["Hawthorn","GWS Giants"],["North Melbourne","Essendon"],["Port Adelaide","Adelaide Crows"]], byes:["Geelong Cats","Melbourne","St Kilda","Western Bulldogs"] },
  "Round 17": { dates:"2–5 July", games:[["Essendon","St Kilda"],["Geelong Cats","Brisbane Lions"],["Gold Coast Suns","Collingwood"],["GWS Giants","Fremantle"],["Hawthorn","Melbourne"],["Port Adelaide","North Melbourne"],["Richmond","Carlton"],["Sydney Swans","Western Bulldogs"],["West Coast Eagles","Adelaide Crows"]], byes:[] },
  "Round 18": { dates:"9–12 July", games:[["Adelaide Crows","Gold Coast Suns"],["Brisbane Lions","Essendon"],["Carlton","Hawthorn"],["Collingwood","North Melbourne"],["Fremantle","Sydney Swans"],["GWS Giants","Geelong Cats"],["Melbourne","Richmond"],["St Kilda","Port Adelaide"],["Western Bulldogs","West Coast Eagles"]], byes:[] },
  "Round 19": { dates:"16–19 July", games:[["Collingwood","Carlton"],["Essendon","GWS Giants"],["Geelong Cats","St Kilda"],["Gold Coast Suns","Western Bulldogs"],["North Melbourne","Melbourne"],["Port Adelaide","Fremantle"],["Richmond","Hawthorn"],["Sydney Swans","Adelaide Crows"],["West Coast Eagles","Brisbane Lions"]], byes:[] },
  "Round 20": { dates:"23–26 July", games:[["Adelaide Crows","Collingwood"],["Brisbane Lions","Port Adelaide"],["Carlton","Gold Coast Suns"],["Fremantle","West Coast Eagles"],["GWS Giants","Sydney Swans"],["Hawthorn","Essendon"],["North Melbourne","St Kilda"],["Melbourne","Geelong Cats"],["Western Bulldogs","Richmond"]], byes:[] },
  "Round 21": { dates:"30 Jul–2 Aug", games:[["Carlton","Brisbane Lions"],["Collingwood","Geelong Cats"],["Essendon","Adelaide Crows"],["Fremantle","Western Bulldogs"],["Gold Coast Suns","Melbourne"],["Hawthorn","North Melbourne"],["Port Adelaide","GWS Giants"],["Richmond","West Coast Eagles"],["St Kilda","Sydney Swans"]], byes:[] },
  "Round 22": { dates:"6–9 August", games:[["Adelaide Crows","Richmond"],["Brisbane Lions","Hawthorn"],["Geelong Cats","Essendon"],["GWS Giants","Gold Coast Suns"],["Melbourne","Fremantle"],["St Kilda","Carlton"],["Sydney Swans","Port Adelaide"],["West Coast Eagles","Collingwood"],["Western Bulldogs","North Melbourne"]], byes:[] },
  "Round 23": { dates:"14–16 August", games:[["Brisbane Lions","Gold Coast Suns"],["Essendon","Sydney Swans"],["Fremantle","Adelaide Crows"],["GWS Giants","West Coast Eagles"],["Hawthorn","Collingwood"],["North Melbourne","Geelong Cats"],["Port Adelaide","Melbourne"],["Richmond","St Kilda"],["Western Bulldogs","Carlton"]], byes:[] },
  "Round 24": { dates:"21–23 August", games:[["Adelaide Crows","GWS Giants"],["Collingwood","Brisbane Lions"],["Carlton","Fremantle"],["Essendon","Port Adelaide"],["Geelong Cats","Richmond"],["Melbourne","Western Bulldogs"],["St Kilda","Gold Coast Suns"],["Sydney Swans","North Melbourne"],["West Coast Eagles","Hawthorn"]], byes:[] }
};
const ROUND_KEYS = Object.keys(FIXTURE);

// ── State ─────────────────────────────────────────────────────────────────
let currentPlayer = localStorage.getItem('footyPlayer') || null;
let isScorer = false;
let currentRoundKey = ROUND_KEYS[0];
let dbData = {}; // { round: { gameIdx: { mum, dad, jack, winner } } }
let saveTimer = null;

// ── Supabase helpers ──────────────────────────────────────────────────────
async function dbFetch(path, opts={}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal',
      ...opts.headers
    },
    ...opts
  });
  if (opts.method === 'GET' || !opts.method) {
    return res.ok ? res.json() : [];
  }
  return res.ok;
}

async function loadAllTips() {
  const rows = await dbFetch('tips?select=round,game_index,player,tip,winner', { method:'GET', headers:{'Prefer':''} });
  dbData = {};
  (rows||[]).forEach(r => {
    if (!dbData[r.round]) dbData[r.round] = {};
    if (!dbData[r.round][r.game_index]) dbData[r.round][r.game_index] = {};
    if (r.player === 'winner') {
      dbData[r.round][r.game_index].winner = r.winner;
    } else {
      dbData[r.round][r.game_index][r.player] = r.tip;
    }
  });
}

async function saveTip(round, gameIndex, player, tip) {
  await dbFetch('tips', {
    method: 'POST',
    headers: { 'Prefer': 'resolution=merge-duplicates,return=minimal' },
    body: JSON.stringify({ round, game_index: gameIndex, player, tip, winner: null, updated_at: new Date().toISOString() })
  });
}

async function saveWinner(round, gameIndex, winner) {
  await dbFetch('tips', {
    method: 'POST',
    headers: { 'Prefer': 'resolution=merge-duplicates,return=minimal' },
    body: JSON.stringify({ round, game_index: gameIndex, player: 'winner', tip: null, winner, updated_at: new Date().toISOString() })
  });
}

// ── Player selection ──────────────────────────────────────────────────────
function setPlayer(p) {
  currentPlayer = p;
  isScorer = false;
  localStorage.setItem('footyPlayer', p);
  document.querySelectorAll('.who-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.who-btn.${p}`).classList.add('active');
  renderCurrentRound();
}

function promptScorer() {
  document.getElementById('pinModal').classList.remove('hidden');
  document.getElementById('pinInput').value = '';
  document.getElementById('pinError').textContent = '';
  setTimeout(() => document.getElementById('pinInput').focus(), 100);
}

function checkPin() {
  const val = document.getElementById('pinInput').value;
  if (val === SCORER_PIN) {
    isScorer = true;
    currentPlayer = null;
    localStorage.removeItem('footyPlayer');
    document.querySelectorAll('.who-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.who-btn.scorer').classList.add('active');
    closePin();
    renderCurrentRound();
  } else {
    document.getElementById('pinError').textContent = 'Wrong PIN, try again';
  }
}

function closePin() {
  document.getElementById('pinModal').classList.add('hidden');
}

// allow enter key on PIN
document.getElementById('pinInput').addEventListener('keydown', e => { if (e.key==='Enter') checkPin(); });

// ── Round loading ─────────────────────────────────────────────────────────
function loadRound() {
  currentRoundKey = document.getElementById('roundSelect').value;
  renderCurrentRound();
}

function renderCurrentRound() {
  const rdata = FIXTURE[currentRoundKey];
  document.getElementById('roundMeta').textContent = rdata.dates;
  const list = document.getElementById('gamesList');
  list.innerHTML = '<div class="loading"><div class="spinner"></div><br>Loading tips…</div>';

  loadAllTips().then(() => {
    list.innerHTML = '';
    rdata.games.forEach((pair, i) => list.appendChild(makeCard(pair, i)));
    if (rdata.byes.length) {
      const b = document.createElement('div');
      b.className = 'bye-notice';
      b.innerHTML = `<p>🛌 Byes: ${rdata.byes.join(', ')}</p>`;
      list.appendChild(b);
    }
  });
}

// ── Card rendering ────────────────────────────────────────────────────────
function makeCard(pair, idx) {
  const [home, away] = pair;
  const saved = (dbData[currentRoundKey] || {})[idx] || {};
  const winner = saved.winner || '';

  const card = document.createElement('div');
  card.className = 'game-card';
  card.dataset.idx = idx;

  // Game header
  card.innerHTML = `
    <div class="game-number">Game ${idx+1}</div>
    <div class="teams-row">
      <div class="team-name">${home}</div>
      <span class="vs">VS</span>
      <div class="team-name">${away}</div>
    </div>
  `;

  // Tips section — show MY tip buttons if a player is selected
  if (currentPlayer) {
    const myTip = saved[currentPlayer] || '';
    const tipDiv = document.createElement('div');
    tipDiv.className = 'my-tip-row';
    tipDiv.innerHTML = `
      <label style="color:var(--${currentPlayer})">Your tip</label>
      <div class="tip-btns">
        <button class="tip-btn ${myTip==='home'?'selected '+currentPlayer:''}" onclick="pickTip(${idx},'home',this)">${home}</button>
        <button class="tip-btn ${myTip==='away'?'selected '+currentPlayer:''}" onclick="pickTip(${idx},'away',this)">${away}</button>
      </div>
    `;
    card.appendChild(tipDiv);
  }

  // All tips summary chips (visible to everyone)
  const chipsDiv = document.createElement('div');
  chipsDiv.className = 'all-tips';
  chipsDiv.id = `chips-${idx}`;
  PLAYERS.forEach(p => {
    const t = saved[p];
    const span = document.createElement('span');
    span.className = `tipper-chip ${t ? p : 'no-tip'}`;
    span.textContent = t ? `${LABELS[p]}: ${t==='home'?home:away}` : `${LABELS[p]}: —`;
    chipsDiv.appendChild(span);
  });
  card.appendChild(chipsDiv);

  // Winner row — only for scorer
  if (isScorer) {
    const wDiv = document.createElement('div');
    wDiv.className = 'winner-row';
    wDiv.innerHTML = `
      <label>Winner</label>
      <select class="winner-select ${winner?'has-winner':''}" onchange="pickWinner(${idx},this)">
        <option value="">Not played yet</option>
        <option value="home" ${winner==='home'?'selected':''}>${home}</option>
        <option value="away" ${winner==='away'?'selected':''}>${away}</option>
      </select>
    `;
    card.appendChild(wDiv);
  }

  // Result ticks if there's a winner
  if (winner) {
    const tickDiv = document.createElement('div');
    tickDiv.className = 'result-ticks';
    tickDiv.id = `ticks-${idx}`;
    PLAYERS.forEach(p => {
      if (!saved[p]) return;
      const correct = saved[p] === winner;
      const teamName = saved[p]==='home' ? home : away;
      const span = document.createElement('span');
      span.className = `tick ${correct?'correct':'wrong'}`;
      span.textContent = `${LABELS[p]}: ${correct?'✓':'✗'} ${teamName}`;
      tickDiv.appendChild(span);
    });
    card.appendChild(tickDiv);
  }

  return card;
}

// ── Interactions ──────────────────────────────────────────────────────────
async function pickTip(idx, tip, btn) {
  if (!currentPlayer) return;

  // Update UI immediately
  const card = btn.closest('.game-card');
  card.querySelectorAll('.tip-btn').forEach(b => b.classList.remove('selected', 'mum','dad','jack'));
  btn.classList.add('selected', currentPlayer);

  // Update chips
  const pair = FIXTURE[currentRoundKey].games[idx];
  const chips = document.getElementById(`chips-${idx}`);
  if (chips) {
    const chip = chips.querySelector(`.tipper-chip.${currentPlayer}`) || chips.querySelector('.tipper-chip.no-tip');
    // find the right chip
    Array.from(chips.children).forEach(c => {
      if (c.classList.contains(currentPlayer) || (c.classList.contains('no-tip') && c.textContent.startsWith(LABELS[currentPlayer]))) {
        c.className = `tipper-chip ${currentPlayer}`;
        c.textContent = `${LABELS[currentPlayer]}: ${tip==='home'?pair[0]:pair[1]}`;
      }
    });
  }

  // Cache locally
  if (!dbData[currentRoundKey]) dbData[currentRoundKey] = {};
  if (!dbData[currentRoundKey][idx]) dbData[currentRoundKey][idx] = {};
  dbData[currentRoundKey][idx][currentPlayer] = tip;

  // Save to DB (debounced)
  showSaving('Saving…');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    await saveTip(currentRoundKey, idx, currentPlayer, tip);
    showSaving('✓ Saved!');
    setTimeout(() => showSaving(''), 2000);
  }, 600);
}

async function pickWinner(idx, sel) {
  const winner = sel.value;
  sel.classList.toggle('has-winner', !!winner);

  if (!dbData[currentRoundKey]) dbData[currentRoundKey] = {};
  if (!dbData[currentRoundKey][idx]) dbData[currentRoundKey][idx] = {};
  dbData[currentRoundKey][idx].winner = winner;

  showSaving('Saving…');
  await saveWinner(currentRoundKey, idx, winner);
  showSaving('✓ Saved!');
  setTimeout(() => showSaving(''), 2000);

  // Refresh ticks
  const card = sel.closest('.game-card');
  let tickDiv = card.querySelector('.result-ticks');
  if (tickDiv) tickDiv.remove();
  if (winner) {
    const pair = FIXTURE[currentRoundKey].games[idx];
    const saved = dbData[currentRoundKey][idx];
    tickDiv = document.createElement('div');
    tickDiv.className = 'result-ticks';
    PLAYERS.forEach(p => {
      if (!saved[p]) return;
      const correct = saved[p] === winner;
      const teamName = saved[p]==='home' ? pair[0] : pair[1];
      const span = document.createElement('span');
      span.className = `tick ${correct?'correct':'wrong'}`;
      span.textContent = `${LABELS[p]}: ${correct?'✓':'✗'} ${teamName}`;
      tickDiv.appendChild(span);
    });
    card.appendChild(tickDiv);
  }
}

function showSaving(msg) {
  document.getElementById('savingIndicator').textContent = msg;
}

// ── Tabs ──────────────────────────────────────────────────────────────────
function showTab(tab, e) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  e.currentTarget.classList.add('active');
  document.getElementById('section-'+tab).classList.add('active');
  if (tab === 'ladder') renderLadder();
}

// ── Ladder ────────────────────────────────────────────────────────────────
async function renderLadder() {
  const content = document.getElementById('ladderContent');
  content.innerHTML = '<div class="loading"><div class="spinner"></div><br>Loading ladder…</div>';
  await loadAllTips();

  const totals = { mum:0, dad:0, jack:0 };
  const byRound = {};

  ROUND_KEYS.forEach(rk => {
    const rnd = { mum:0, dad:0, jack:0 };
    const games = FIXTURE[rk].games;
    games.forEach((_, i) => {
      const g = (dbData[rk]||{})[i] || {};
      if (!g.winner) return;
      PLAYERS.forEach(p => { if (g[p]===g.winner) { rnd[p]+=2; totals[p]+=2; } });
    });
    byRound[rk] = rnd;
  });

  const hasData = ROUND_KEYS.some(rk => FIXTURE[rk].games.some((_,i)=>(dbData[rk]||{})[i]?.winner));
  if (!hasData) {
    content.innerHTML = `<div class="empty-state"><span class="big-emoji">🏉</span><p>No results entered yet — check back after games are played!</p></div>`;
    return;
  }

  const sorted = Object.entries(totals).sort((a,b)=>b[1]-a[1]);
  const playedRounds = ROUND_KEYS.filter(rk => FIXTURE[rk].games.some((_,i)=>(dbData[rk]||{})[i]?.winner));

  let html = `<table class="ladder-table"><thead><tr>
    <th>Tipper</th><th>Total</th>
    ${playedRounds.map(rk=>`<th style="font-size:0.62rem">${rk.replace('Round ','R')}</th>`).join('')}
  </tr></thead><tbody>`;

  sorted.forEach(([p,tot],i) => {
    html += `<tr class="ladder-row">
      <td><span class="rank-badge rank-${i+1}">${i+1}</span><span class="player-name ${p}">${LABELS[p]}</span></td>
      <td><span class="pts-total">${tot}</span></td>
      ${playedRounds.map(rk=>`<td class="pts-cell">${byRound[rk]?.[p]??'—'}</td>`).join('')}
    </tr>`;
  });
  html += `</tbody></table>`;

  if (playedRounds.length) {
    html += `<div class="round-breakdown"><h3>Round by Round</h3>`;
    playedRounds.forEach(rk => {
      const played = FIXTURE[rk].games.filter((_,i)=>(dbData[rk]||{})[i]?.winner).length;
      const total = FIXTURE[rk].games.length;
      html += `<div class="breakdown-card"><div class="breakdown-round">
        <span>${rk} — ${played}/${total} results</span>
        <div class="scorer-chips">
          ${PLAYERS.map(p=>`<span class="chip ${p}">${LABELS[p]} ${byRound[rk]?.[p]??0}pts</span>`).join('')}
        </div>
      </div></div>`;
    });
    html += `</div>`;
  }

  content.innerHTML = html;
}

// ── Init ──────────────────────────────────────────────────────────────────
function init() {
  const sel = document.getElementById('roundSelect');
  ROUND_KEYS.forEach(rk => {
    const o = document.createElement('option');
    o.value = rk; o.textContent = rk;
    sel.appendChild(o);
  });
  sel.value = ROUND_KEYS[0];
  currentRoundKey = ROUND_KEYS[0];

  // Restore player
  if (currentPlayer) {
    const btn = document.querySelector(`.who-btn.${currentPlayer}`);
    if (btn) btn.classList.add('active');
  }

  renderCurrentRound();
}

init();
</script>
